function getWeekday(year, month, day)
{

	var weekday = Array("일", "월", "화", "수", "목", "금", "토");
	var date = new Date(year, month - 1, day);

	if (date)
		return weekday[date.getDay()];
}

function getPassDay(year, month, day)
{
	var date = new Date(year, month - 1, day);

	var interval = Math.floor((todayDate - date) / (1000 * 60 * 60 * 24) + 1);

	return interval;
}

function getDDay(year, month, day)
{
	var date = new Date(year, month - 1, day);

	var interval = Math.floor((date - todayDate) / (1000 * 60 * 60 * 24) + 1);

	return interval;
}

function getDateSpecificInterval(year, month, day, interval)
{
	var date = new Date(year, month - 1, parseInt(day, 10) + parseInt(interval, 10) - 1);

	return date;
}

function checkGanJiY( year , what ){

	var GanTable = new Array("甲","乙","丙","丁","戊","己","庚","辛","壬","癸");
	var JiTable = new Array("子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥");
	var DdiTable = new Array("쥐","소","호랑이","토끼","용","뱀","말","양","원숭이","닭","개","돼지");

	var BasicYear = 1984;
	var difference =  ( year - BasicYear ) % 60 ;
	var ganIdx, jiIdx;

	if( difference < 0 ) difference = difference + 60;

	ganIdx = difference % 10;
	jiIdx = difference % 12;

	if ( what == 'gan' ) 		return GanTable[ganIdx];
	else if( what == 'ji' )	return JiTable[jiIdx];
	else if( what == 'ddi' )	return DdiTable[jiIdx];
	else						return GanTable[ganIdx] + JiTable[jiIdx];

}

		if (today > startDate)
		{
			alert("기준일을 오늘 이후 날짜로 설정하세요");
			return;
		}

		document.getElementById("day3").value = interval;

		break;

	/* 요일 계산 */
	case 4:
		if (startYear < 100)
		{
			alert('년도를 100년 이후로 입력해 주세요');
			return;
		}
		weekday.value = getWeekday(startYear, startMonth, startDay) + "요일";

		break;

	/* 양력/음력 변환 */
	case 5:
		if (document.getElementById('solarLunar').value == 'solar')
		{
			var leapMonth = document.getElementById('leapMonth').checked;
			var date = lunarCalc(startYear, startMonth, startDay, 2, leapMonth);
		}
		else
		{
			var date = lunarCalc(startYear, startMonth, startDay, 1);
		}

		if (date)
		{
			document.getElementById('solarLunarDay').value = 
				date.year + "년 " + 
				(date.leapMonth ? "윤" : "") + date.month + "월 " +
				date.day + "일";

		}
		else
		{
			document.getElementById('solarLunarDay').value = "";
		}

		break;
	}
}

function memorialDayCheck(solarDate, lunarDate)
{
	var i;
	var memorial;


	for (i = 0; i < memorialDays.length; i++)
	{
		if (memorialDays[i].month == solarDate.month &&
			memorialDays[i].day == solarDate.day &&
			memorialDays[i].solarLunar == 1){
		if ( solarDate.year >= 2000 && solarDate.month == 1 && solarDate.day == 2) {
				return null;
			}
			return memorialDays[i];
			}

		if (memorialDays[i].month == lunarDate.month &&
			memorialDays[i].day == lunarDate.day &&
			memorialDays[i].solarLunar == 2 &&
			!memorialDays[i].leapMonth){
		if ( lunarDate.leapMonth && lunarDate.month == 1 && lunarDate.day >= 1 && lunarDate.day <= 2) {
				return null;
			}
		if ( lunarDate.leapMonth && lunarDate.month == 4 && lunarDate.day == 8 ) {
				return null;
			}
		if ( lunarDate.leapMonth && lunarDate.month == 8 && lunarDate.day >= 14 && lunarDate.day <= 16) {
				return null;
			}
			return memorialDays[i];
			}
	}

	return null;
}

	function yearmemorialDayCheck(solarDate, lunarDate)
{
	var i;
	var yearmemorial;


	for (i = 0; i < yearmemorialDays.length; i++)
	{
		if (yearmemorialDays[i].year == solarDate.year &&
		yearmemorialDays[i].month == solarDate.month &&
			yearmemorialDays[i].day == solarDate.day &&
			yearmemorialDays[i].solarLunar == 1)
			return yearmemorialDays[i];

		if (yearmemorialDays[i].year == lunarDate.year &&
		yearmemorialDays[i].month == lunarDate.month &&
			yearmemorialDays[i].day == lunarDate.day &&
			yearmemorialDays[i].solarLunar == 2 &&
			!yearmemorialDays[i].leapMonth)
			return yearmemorialDays[i];
	}

	return null;
	}

function setCalendar(year, month)
{
	var i;
	var oYearSelect = document.getElementById('yearSelect');
	var oMonthSelect = document.getElementById('monthSelect');

	if (!year)
	{
		year = oYearSelect.value;
		month = oMonthSelect.value;
	}
	else
	{
		for (i = 0; i < oYearSelect.length; i++)
			if (oYearSelect[i].value == year)
			{
				oYearSelect.selectedIndex = i;
				break;
			}
	
		for (i = 0; i < oMonthSelect.length; i++)
			if (oMonthSelect[i].value == month)
			{
				oMonthSelect.selectedIndex = i;
				break;
			}
	}

	var monthDay = Array(31, 0, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31);

	/* set monthDay of Feb */
	if (year % 400 == 0)
		monthDay[1] = 29;
	else if (year % 100 == 0)
		monthDay[1] = 28;
	else if (year % 4 == 0)
		monthDay[1] = 29;
	else
		monthDay[1] = 28;

	/* set the day before 설날 */
	if (lunarMonthTable[year - 1 - 101][11] == 1)

			solarDate.month == 8 && solarDate.day >= chkMalbokStart(solarDate.year) && solarDate.day <= chkMalbokEnd(solarDate.year) && getBokBasicDate(solarDate.year, solarDate.month, solarDate.day) == 6 && memorial)
			dayHTML = dayHTML.replace("AND", "·");

		//한식, 복날
		if (solarDate.month == 4 && solarDate.day == chkHansik(solarDate.year))
			dayHTML = dayHTML.replace("JAPJEOL", "한식");
			
		if (solarDate.month == 7 && solarDate.day >= chkChobokStart(solarDate.year) && solarDate.day <= chkChobokEnd(solarDate.year) && getBokBasicDate(solarDate.year, solarDate.month, solarDate.day) == 6)
			dayHTML = dayHTML.replace("JAPJEOL", "초복");

		if (solarDate.month == 8 && chkJungbokEnd(solarDate.year) < 10 && solarDate.day <= chkJungbokEnd(solarDate.year) && getBokBasicDate(solarDate.year, solarDate.month, solarDate.day) == 6)
			dayHTML = dayHTML.replace("JAPJEOL", "중복");

		else if (solarDate.month == 7 && chkJungbokEnd(solarDate.year) >= 10 && solarDate.day >= chkJungbokStart(solarDate.year) && solarDate.day <= chkJungbokEnd(solarDate.year) && getBokBasicDate(solarDate.year, solarDate.month, solarDate.day) == 6)
			dayHTML = dayHTML.replace("JAPJEOL", "중복");
			
		if (solarDate.month == 8 && solarDate.day >= chkMalbokStart(solarDate.year) && solarDate.day <= chkMalbokEnd(solarDate.year) && getBokBasicDate(solarDate.year, solarDate.month, solarDate.day) == 6)
			dayHTML = dayHTML.replace("JAPJEOL", "말복");
		
		if (yearmemorial)
			dayHTML = dayHTML.replace("MEMO", yearmemorial.name);
		
		if (memorial)
			dayHTML = dayHTML.replace("MEMO", memorial.name);
			
		if (solarDate.month == 5 && solarDate.day >= 15 && solarDate.day <= 21 && index % 7 == 1)
			dayHTML = dayHTML.replace("MEMO", "성년의날");
			
		dayHTML = dayHTML.replace("COLOR", "");
		dayHTML = dayHTML.replace("AT", "");
		dayHTML = dayHTML.replace("JEOLGI", "");
		dayHTML = dayHTML.replace("MEMO", "");
		dayHTML = dayHTML.replace("AND", "");
		dayHTML = dayHTML.replace("JAPJEOL", "");
		dayHTML = dayHTML.replace("HIGHLIGHT_START", "");
		dayHTML = dayHTML.replace("HIGHLIGHT_END", "");

		document.getElementById('dayCell' + index).innerHTML = dayHTML;
		
	}
